<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 840" width="100%" height="100%">
  <rect width="960" height="840" fill="#121214" rx="8"/>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-error" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#dc2626"/>
    </marker>
    
  </defs>

  <style>
    .title { font-family: 'Source Sans 3', 'Segoe UI', sans-serif; font-weight: 700; font-size: 22px; fill: #f8fafc; letter-spacing: 0.3px; }
    .subtitle { font-family: 'Source Sans 3', 'Segoe UI', sans-serif; font-size: 13px; fill: #94a3b8; }
    .node-text-title { font-family: 'Source Sans 3', 'Segoe UI', sans-serif; font-weight: 700; font-size: 14px; fill: #f8fafc; }
    .node-text-ch { font-family: 'IBM Plex Mono', 'Consolas', monospace; font-size: 12px; font-weight: 600; fill: #93c5fd; }
    .data-text { font-family: 'IBM Plex Mono', 'Consolas', monospace; font-size: 13px; font-weight: 600; fill: #e2e8f0; }
    .data-type { font-family: 'IBM Plex Mono', 'Consolas', monospace; font-size: 11px; fill: #93c5fd; font-weight: 600; }
    .error-tag { font-family: 'Source Sans 3', 'Segoe UI', sans-serif; font-size: 11px; font-weight: 700; fill: #ef4444; }
    .error-desc { font-family: 'Source Sans 3', 'Segoe UI', sans-serif; font-size: 11px; fill: #fca5a5; }
    .boundary-text { font-family: 'Source Sans 3', 'Segoe UI', sans-serif; font-size: 12px; font-weight: 700; fill: #e2e8f0; letter-spacing: 1px; }
    .subtext-label { font-family: 'IBM Plex Mono', 'Consolas', monospace; font-size: 10px; font-weight: 600; fill: #94a3b8; }
  </style>

  <g transform="translate(40, 45)">
    <text x="0" y="0" class="title">Quantization: End-to-End Inference Pipeline</text>
    <text x="0" y="22" class="subtitle">Algorithmic transformation and discrete hardware constraints across a single layer</text>
  </g>

  <line x1="60" y1="120" x2="60" y2="780" stroke="#334155" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="45" y="340" width="30" height="110" rx="4" fill="#1e293b"/>
  <text x="60" y="395" transform="rotate(-90 60 395)" text-anchor="middle" class="boundary-text" fill="#64748b">GRAPH BOUNDARY</text>

  <rect x="90" y="140" width="170" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="105" y="162" class="node-text-title">Static Weights</text>
  <text x="105" y="180" class="data-type">FLOAT32 (Constant)</text>

  <line x1="260" y1="165" x2="330" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="330" y="130" width="220" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="345" y="160" class="node-text-title">Affine Parameter Derivation</text>
  <text x="345" y="182" class="node-text-ch">Chapter 3: Scale &amp; ZP</text>

  <line x1="550" y1="165" x2="620" y2="165" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-error)"/>
  <text x="560" y="143" class="error-tag">▲ ROUNDING ERROR</text>
  <text x="560" y="156" class="error-desc">Grid Discretization</text>

  <rect x="620" y="140" width="170" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="635" y="162" class="node-text-title">Quantized Weights</text>
  <text x="635" y="180" class="data-type">INT8 (Discrete Grid)</text>


  <rect x="90" y="270" width="170" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="105" y="292" class="node-text-title">Layer Activations</text>
  <text x="105" y="310" class="data-type">FLOAT32 (Dynamic)</text>

  <line x1="260" y1="295" x2="330" y2="295" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="330" y="260" width="220" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="345" y="290" class="node-text-title">Range Calibration / Observer</text>
  <text x="345" y="312" class="node-text-ch">Chapter 9: Calibration</text>

  <line x1="550" y1="295" x2="620" y2="295" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-error)"/>
  <text x="560" y="273" class="error-tag">▲ CLIPPING ERROR</text>
  <text x="560" y="286" class="error-desc">Dynamic Range Truncation</text>

  <rect x="620" y="270" width="170" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="635" y="292" class="node-text-title">Quantized Activations</text>
  <text x="635" y="310" class="data-type">INT8 (Discrete Grid)</text>


  <path d="M 705 190 L 705 240" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>
  <path d="M 705 320 L 705 360" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>

  <rect x="585" y="360" width="240" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="605" y="390" class="node-text-title">MAC Execution Engine</text>
  <text x="605" y="412" class="node-text-ch">Chapter 4: Hardware Arithmetic</text>

  <line x1="705" y1="430" x2="705" y2="470" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <rect x="610" y="470" width="190" height="45" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="625" y="497" class="data-text">INT32 Accumulator Register</text>
  <text x="705" y="483" text-anchor="middle" class="subtext-label">CHAPTER 6</text>

  <line x1="705" y1="515" x2="705" y2="550" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-error)"/>
  <text x="720" y="530" class="error-tag">▲ ACCUMULATED ROUNDING ERROR</text>
  <text x="720" y="543" class="error-desc">Downscaling / Down-shifting Bits</text>

  <rect x="595" y="550" width="220" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="705" y="572" text-anchor="middle" class="node-text-title">Requantization / Downscaling Pipeline</text>
  <text x="705" y="590" text-anchor="middle" class="node-text-ch">Chapter 7: Requantization Operations</text>


  <line x1="705" y1="600" x2="705" y2="635" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <rect x="595" y="635" width="220" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="705" y="665" text-anchor="middle" class="node-text-title">Fused Nonlinearities</text>
  <text x="705" y="687" text-anchor="middle" class="node-text-ch">Chapter 8: Elementwise Fusion</text>

  <line x1="705" y1="705" x2="705" y2="740" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <rect x="595" y="740" width="220" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="705" y="762" text-anchor="middle" class="node-text-title">Layer Output Tensor</text>
  <text x="705" y="780" text-anchor="middle" class="data-type">INT8 (Compressed Segment)</text>


  <line x1="705" y1="790" x2="705" y2="815" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <g transform="translate(40, 820)">
    <line x1="20" y1="5" x2="860" y2="5" stroke="#334155" stroke-width="2" stroke-dasharray="4,4"/>
    <rect x="400" y="-8" width="140" height="24" rx="4" fill="#1e293b"/>
    <text x="470" y="8" text-anchor="middle" class="boundary-text" fill="#64748b">NEXT LAYER BOUNDARY</text>
  </g>
</svg>
